version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-spotifycharts}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spotifycharts}
      POSTGRES_DB: ${DB_NAME:-spotifycharts}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-spotifycharts}:${DB_PASSWORD:-spotifycharts}@db:5432/${DB_NAME:-spotifycharts}
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
